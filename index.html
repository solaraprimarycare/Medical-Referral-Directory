<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Medical Referral Directory</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f4f8;
    --card: #ffffff;
    --accent: #1e2d5a;
    --accent-light: #eef0f7;
    --text: #1a1a1a;
    --muted: #5a6070;
    --border: #e0dce8;
    --pill-bg: #eef0f7;
    --pill-text: #1e2d5a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 0 0 60px; }
  .header { background: linear-gradient(135deg, #1e2d5a 0%, #2a4a8a 25%, #e8521a 65%, #f0832a 100%); color: white; padding: 18px 24px; border-bottom: 4px solid #162040; display: flex; justify-content: space-between; align-items: center; }
  .header-left { display: flex; align-items: center; gap: 20px; }
  .header-text h1 { font-family: 'DM Serif Display', serif; font-size: 2rem; margin-bottom: 4px; }
  .header-text p { font-size: 0.9rem; opacity: 0.9; }
  .print-btn { background: white; color: var(--accent); border: none; padding: 10px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; }
  .controls { max-width: 860px; margin: 28px auto 0; padding: 0 20px; display: flex; gap: 12px; flex-wrap: wrap; }
  .search-wrap { flex: 1; position: relative; min-width: 200px; }
  .search-wrap input { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 0.9rem; }
  .multiselect-container { position: relative; min-width: 200px; }
  .multiselect-select { width: 100%; padding: 11px 14px; border: 1.5px solid var(--border); border-radius: 8px; background: white; cursor: pointer; font-size: 0.9rem; user-select: none; }
  .multiselect-select:hover { background: var(--accent-light); }
  .multiselect-options { display: none; position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: white; border: 1.5px solid var(--border); border-radius: 8px; max-height: 300px; overflow-y: auto; z-index: 100; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
  .multiselect-options.show { display: block; }
  .multiselect-option { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; border-bottom: 1px solid #f0f0f0; }
  .multiselect-option:last-child { border-bottom: none; }
  .multiselect-option:hover { background: var(--accent-light); }
  .multiselect-option input[type="checkbox"] { cursor: pointer; width: 16px; height: 16px; }
  .multiselect-option label { cursor: pointer; flex: 1; margin: 0; }
  .main { max-width: 860px; margin: 24px auto 0; padding: 0 20px; }
  .specialty-section { margin-bottom: 28px; }
  .specialty-header { display: flex; align-items: center; gap: 12px; background: linear-gradient(135deg, #1e2d5a 0%, #2e4fa0 30%, #e8521a 100%); color: white; padding: 12px 18px; border-radius: 10px 10px 0 0; cursor: pointer; user-select: none; }
  .specialty-header h2 { font-family: 'DM Serif Display', serif; font-size: 1.05rem; flex: 1; }
  .specialty-count { background: rgba(255,255,255,0.2); border-radius: 20px; padding: 2px 10px; font-size: 0.78rem; }
  .specialty-section.collapsed .providers-list { display: none; }
  .providers-list { border: 1.5px solid var(--border); border-top: none; border-radius: 0 0 10px 10px; background: white; }
  .provider-card { padding: 16px 20px; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: 1fr auto; gap: 16px; }
  .provider-card:last-child { border-bottom: none; }
  .provider-card:hover { background: var(--accent-light); }
  .provider-card.hidden { display: none; }
  .provider-name { font-weight: 600; font-size: 0.92rem; }
  .provider-address { font-size: 0.83rem; color: var(--muted); line-height: 1.4; margin-top: 4px; }
  .phone-link { display: inline-block; background: var(--pill-bg); color: var(--pill-text); text-decoration: none; font-size: 0.82rem; font-weight: 600; padding: 6px 12px; border-radius: 6px; margin-top: 8px; }
  .phone-link:hover { background: #1e2d5a; color: white; }
  .location-block { margin-top: 10px; padding-top: 8px; border-top: 1px dashed var(--border); font-size: 0.83rem; }
  .location-heading { font-weight: 600; color: var(--accent); font-size: 0.78rem; text-transform: uppercase; margin-bottom: 2px; }
  .no-results { padding: 40px 20px; display: none; text-align: center; color: var(--muted); }
  .no-results.show { display: block; }
</style>
</head>
<body>
<div class="header">
  <div class="header-left">

      <h1>Medical Referral Directory</h1>

    </div>
  </div>
  <button class="print-btn" onclick="window.print()">🖨️ Print</button>
</div>

<div class="controls">

  </div>
  <div class="multiselect-container">
    <div class="multiselect-select" id="multiselectTrigger">All Specialties ▼</div>
    <div class="multiselect-options" id="multiselectMenu"></div>

</div>

<div class="main" id="mainContent">
  <div class="no-results" id="noResults">No providers match your search criteria.</div>
</div>

<script>

  {specialty: "Obstetric & Gynecology", name: "Dr. Namrata Shah, MD", address: "1802 Oak Tree Rd, Edison, NJ 08820", phone: "(732)-662-5499"},
  {specialty: "Obstetric & Gynecology", name: "Dr. Shwetha Shrivatsa, MD", address: "740 Route 1 North, Iselin, NJ 08830", phone: "(732)-321-0003"},
  {specialty: "Orthopedic Surgery", name: "Dr. David Porter, MD", address: "3 Progress St, STE 102, Edison, NJ 08820", phone: "(201)-227-1299"},
  {specialty: "Pain Management", name: "Dr. Kevin S. Choe, MD", address: "1005 Green St, Iselin, NJ 08830", phone: "(732)-283-2224"},
  {specialty: "Pain Management", name: "Dr. Michelle Lavin, MD", address: "1043 Route 9 North, Parlin, NJ 08859", phone: "(732)-721-3939"},
  {specialty: "Palliative Care", name: "Astera Cancer Care - Palliative", address: "3 Progress St, Ste 100, Edison, NJ 08820", phone: "(908)-757-9696"},
  {specialty: "Psychology / Therapy", name: "Calm and Sense Therapy", address: "551 Park Ave #7, Scotch Plains, NJ 07076", phone: "(908)-280-5742"},
  {specialty: "Pulmonology", name: "Dr. Pooja Indukuri Raju, MD (HMH)", address: "80 James St, 2nd Fl, Edison, NJ 08820", phone: "(732)-321-7000"},
  {specialty: "Pulmonology", name: "Dr. Carlos Remolina, MD (HMH)", address: "712 North Wood Avenue, Linden, NJ 07036", phone: "(908)-241-2030"},
  {specialty: "Rheumatology", name: "Solara Rheumatology", address: "Multiple Regional Locations, NJ", phone: "(855)-765-2721"},
  {specialty: "Surgical Oncology", name: "Dr. Benjamin Jon Golas, MD (HMH)", address: "80 James St, Edison, NJ 08820", phone: "(732)-744-5550"},
  {specialty: "Urology", name: "Dr. Neil D. Sherman, MD (HMH)", address: "3830 Park Avenue, Edison, NJ 08820", phone: "(732)-494-9400"},
  {specialty: "Urology", name: "Astera Urology", address: "Multiple Regional Locations, NJ", phone: "(732)-390-4447", locations: [{heading: "East Brunswick", address: "4 Auer Court, East Brunswick, NJ 08816"}, {heading: "Rahway", address: "1 Rahway Plaza, Rahway, NJ 07065"}]}
];

const grouped = {};
providerData.forEach(p => {
  if (!grouped[p.specialty]) grouped[p.specialty] = [];
  grouped[p.specialty].push(p);
});

const specialties = Object.keys(grouped).sort();
let selected = new Set(specialties);

function render() {
  const main = document.getElementById('mainContent');
  const search = document.getElementById('searchInput');
  const noRes = document.getElementById('noResults');
  
  main.innerHTML = '';
  
  specialties.forEach(spec => {
    const section = document.createElement('div');
    section.className = 'specialty-section';
    section.dataset.specialty = spec;
    
    const header = document.createElement('div');
    header.className = 'specialty-header';
    header.onclick = () => {
      section.classList.toggle('collapsed');
    };
    
    const h2 = document.createElement('h2');
    h2.textContent = spec;
    
    const count = document.createElement('span');
    count.className = 'specialty-count';
    count.textContent = grouped[spec].length;
    
    header.appendChild(h2);
    header.appendChild(count);
    section.appendChild(header);
    
    const list = document.createElement('div');
    list.className = 'providers-list';
    
    grouped[spec].forEach(p => {
      const card = document.createElement('div');
      card.className = 'provider-card';
      card.dataset.name = p.name.toLowerCase();
      card.dataset.addr = p.address.toLowerCase();
      
      const info = document.createElement('div');
      const pname = document.createElement('div');
      pname.className = 'provider-name';
      pname.textContent = p.name;
      
      const paddr = document.createElement('div');
      paddr.className = 'provider-address';
      paddr.textContent = p.address;
      
      info.appendChild(pname);
      info.appendChild(paddr);
      
      if (p.locations) {
        p.locations.forEach(loc => {
          const locDiv = document.createElement('div');
          locDiv.className = 'location-block';
          
          const heading = document.createElement('div');
          heading.className = 'location-heading';
          heading.textContent = loc.heading;
          
          const addr = document.createElement('div');
          addr.textContent = loc.address;
          addr.style.fontSize = '0.83rem';
          
          locDiv.appendChild(heading);
          locDiv.appendChild(addr);
          info.appendChild(locDiv);
        });
      }
      
      const phone = document.createElement('a');
      phone.href = 'tel:' + p.phone.replace(/\D/g, '');
      phone.className = 'phone-link';
      phone.textContent = p.phone;
      
      const phoneDiv = document.createElement('div');
      phoneDiv.style.textAlign = 'right';
      phoneDiv.appendChild(phone);
      
      card.appendChild(info);
      card.appendChild(phoneDiv);
      list.appendChild(card);
    });
    
    section.appendChild(list);
    main.appendChild(section);
  });
  
  filter();
}

function filter() {
  const main = document.getElementById('mainContent');
  const search = document.getElementById('searchInput');
  const noRes = document.getElementById('noResults');
  
  const q = search.value.toLowerCase().trim();
  let hasVisible = false;
  
  document.querySelectorAll('.specialty-section').forEach(sec => {
    const spec = sec.dataset.specialty;
    
    if (!selected.has(spec)) {
      sec.style.display = 'none';
      return;
    }
    
    let visible = false;
    sec.querySelectorAll('.provider-card').forEach(card => {
      const match = card.dataset.name.includes(q) || card.dataset.addr.includes(q) || !q;
      card.style.display = match ? '' : 'none';
      if (match) visible = true;
    });
    
    sec.style.display = visible ? '' : 'none';
    if (visible) hasVisible = true;
  });
  
  noRes.classList[hasVisible ? 'remove' : 'add']('show');
}

function updateSelectDisplay() {
  const trigger = document.getElementById('multiselectTrigger');
  if (selected.size === specialties.length) {
    trigger.textContent = 'All Specialties ▼';
  } else if (selected.size === 0) {
    trigger.textContent = 'No Specialties ▼';
  } else {
    trigger.textContent = selected.size + ' Selected ▼';
  }
}

function setupMenu() {
  const menu = document.getElementById('multiselectMenu');
  const trigger = document.getElementById('multiselectTrigger');
  const container = document.querySelector('.multiselect-container');
  const search = document.getElementById('searchInput');
  
  // Select All option
  const allCheckDiv = document.createElement('div');
  allCheckDiv.className = 'multiselect-option';
  const allChk = document.createElement('input');
  allChk.type = 'checkbox';
  allChk.id = 'chk_all';
  allChk.checked = true;
  const allLbl = document.createElement('label');
  allLbl.htmlFor = 'chk_all';
  allLbl.textContent = 'Select All';
  allCheckDiv.appendChild(allChk);
  allCheckDiv.appendChild(allLbl);
  
  allChk.onchange = () => {
    if (allChk.checked) {
      selected = new Set(specialties);
      document.querySelectorAll('.multiselect-options input[type="checkbox"]').forEach(chk => {
        chk.checked = true;
      });
    } else {
      selected.clear();
      document.querySelectorAll('.multiselect-options input[type="checkbox"]').forEach(chk => {
        chk.checked = false;
      });
    }
    updateSelectDisplay();
    filter();
  };
  
  menu.appendChild(allCheckDiv);
  
  // Individual specialties
  specialties.forEach(s => {
    const opt = document.createElement('div');
    opt.className = 'multiselect-option';
    const chk = document.createElement('input');
    chk.type = 'checkbox';
    chk.id = 'chk_' + s.replace(/\s+/g, '_');
    chk.checked = true;
    const lbl = document.createElement('label');
    lbl.htmlFor = chk.id;
    lbl.textContent = s;
    opt.appendChild(chk);
    opt.appendChild(lbl);
    
    chk.onchange = () => {
      if (chk.checked) {
        selected.add(s);
      } else {
        selected.delete(s);
      }
      
      allChk.checked = (selected.size === specialties.length);
      updateSelectDisplay();
      filter();
    };
    
    menu.appendChild(opt);
  });
  
  // Toggle dropdown
  trigger.onclick = (e) => {
    e.stopPropagation();
    menu.classList.toggle('show');
  };
  
  // Close dropdown when clicking outside
  document.addEventListener('click', (e) => {
    if (!container.contains(e.target)) {
      menu.classList.remove('show');
    }
  });
  
  // Search functionality
  search.oninput = filter;
}

// Initialize when DOM is ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => {
    render();
    setupMenu();
  });
} else {
  render();
  setupMenu();
}
</script>
</body>
</html>
